<!DOCTYPE html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>모바일 청첩장</title>
    <meta name="description" content="바닐라 JS 기반 모바일 청첩장" />
    <meta property="og:title" content="모바일 청첩장" />
    <meta property="og:description" content="소중한 분들을 초대합니다." />
    <meta property="og:type" content="website" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;500;600&family=Gowun+Dodum&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="styles.css" />
    <script defer src="script.js"></script>
  </head>
  <body>
    <main class="invite-shell">
      <section class="hero-section section-block reveal">
        <div class="title-overlay" id="titleOverlay"></div>

        <div class="hero-photo-wrap">
          <img id="heroPhoto" src="" alt="웨딩 메인 사진" class="hero-photo" />
        </div>

        <div class="divider-line"></div>
        <p class="hero-meta" id="heroDateText"></p>
        <p class="hero-meta" id="heroTimeText"></p>
        <p class="hero-meta venue-name" id="heroVenue"></p>
        <div class="divider-line bottom"></div>
      </section>

      <section class="section-block intro-section reveal">
        <div class="section-heading">
          <p class="section-en" id="invitationTitleEn"></p>
          <p class="section-ko" id="invitationTitleKo"></p>
        </div>

        <div class="message-copy" id="messageCopy"></div>
        <div class="family-lines" id="familyLines"></div>

        <div class="couple-summary" id="coupleSummary"></div>
      </section>

      <section class="section-block day-section reveal">
        <div class="section-heading">
          <p class="section-en">Wedding Day</p>
          <p class="section-ko" id="daySectionTitle"></p>
        </div>

        <div class="calendar-wrap">
          <div id="calendar" class="calendar" aria-label="결혼식 달력"></div>
        </div>

        <div class="countdown" id="countdown">
          <div><span id="days">0</span><label>DAYS</label></div>
          <div><span id="hours">0</span><label>HOUR</label></div>
          <div><span id="minutes">0</span><label>MIN</label></div>
          <div><span id="seconds">0</span><label>SEC</label></div>
        </div>

        <p class="dday-copy" id="ddayCopy"></p>
      </section>

      <section class="section-block location-section reveal">
        <div class="section-heading">
          <p class="section-en">Location</p>
          <p class="section-ko">오시는 길</p>
        </div>

        <p class="location-title" id="locationTitle"></p>
        <p class="location-address"><button id="copyAddressBtn" class="copy-inline" type="button" aria-label="주소 복사">⌘</button><span id="locationAddress"></span></p>

        <div id="map" class="map-box map-image-box" aria-label="카카오 지도 이미지"></div>
        <p id="mapFallbackNote" class="map-fallback-note" hidden>지도가 바로 표시되지 않으면 아래 버튼으로 열어보세요.</p>

        <div class="map-links two-col">
          <a id="naverMapLink" href="#" target="_blank" rel="noreferrer">네이버지도</a>
          <a id="kakaoMapLink" href="#" target="_blank" rel="noreferrer">카카오맵</a>
        </div>
      </section>

      <section class="section-block gallery-section reveal">
        <div class="section-heading">
          <p class="section-en">Gallery</p>
          <p class="section-ko">함께할 순간들</p>
        </div>

        <div class="gallery-grid" id="galleryGrid"></div>
      </section>

      <section class="section-block guestbook-section reveal">
        <div class="section-heading">
          <p class="section-en">Guestbook</p>
          <p class="section-ko">축하 메시지</p>
        </div>

        <div class="info-grid one-up" id="guestbookList"></div>

        <form id="guestbookForm" class="form-card">
          <input id="guestbookName" class="form-input" type="text" placeholder="이름" required />
          <textarea id="guestbookMessage" class="form-input form-textarea" placeholder="축하 메시지를 남겨주세요" required></textarea>
          <button type="submit" class="form-button">메시지 JSON 다운로드</button>
        </form>
      </section>

      <section class="section-block attendance-section reveal">
        <div class="section-heading">
          <p class="section-en">RSVP</p>
          <p class="section-ko">참석 의사 전달</p>
        </div>

        <div class="info-grid one-up" id="attendanceList"></div>

        <form id="attendanceForm" class="form-card">
          <input id="attendanceName" class="form-input" type="text" placeholder="이름" required />
          <select id="attendanceSide" class="form-input">
            <option value="신랑측">신랑측</option>
            <option value="신부측">신부측</option>
          </select>
          <select id="attendanceStatus" class="form-input">
            <option value="true">참석</option>
            <option value="false">불참</option>
          </select>
          <input id="attendanceCompanions" class="form-input" type="number" min="0" value="0" placeholder="동반 인원" />
          <textarea id="attendanceNote" class="form-input form-textarea" placeholder="전달할 메모"></textarea>
          <button type="submit" class="form-button">참석의사 JSON 다운로드</button>
        </form>
      </section>

      <section class="section-block contact-section reveal">
        <div class="section-heading">
          <p class="section-en">Contact</p>
          <p class="section-ko">연락하기</p>
        </div>

        <div class="info-grid two-up" id="contactGrid"></div>
      </section>

      <section class="section-block account-section reveal">
        <div class="section-heading">
          <p class="section-en">Account</p>
          <p class="section-ko">마음 전하실 곳</p>
        </div>

        <div class="info-grid one-up" id="accountGrid"></div>
      </section>
    </main>

    <div id="lightbox" class="lightbox" hidden aria-hidden="true">
      <button id="lightboxClose" class="lightbox-close" type="button" aria-label="갤러리 닫기">×</button>
      <img id="lightboxImage" src="" alt="확대된 갤러리 이미지" />
    </div>
  </body>
</html>
