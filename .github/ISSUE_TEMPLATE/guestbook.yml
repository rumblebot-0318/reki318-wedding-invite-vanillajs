name: Guestbook message
description: Leave a congratulatory message for the wedding invitation
title: "[guestbook] {{name}}"
labels: [guestbook]
body:
  - type: input
    id: name
    attributes:
      label: Name
      placeholder: 홍길동
    validations:
      required: true
  - type: textarea
    id: message
    attributes:
      label: Message
      placeholder: 두 분 결혼 진심으로 축하합니다!
    validations:
      required: true
